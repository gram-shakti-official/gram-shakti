<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ग्राम शक्ति - एडमिन कंट्रोल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Devanagari', sans-serif; 
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .active-tab { 
            background-color: #ea580c; 
            color: white; 
            border-radius: 8px;
        }
        /* मोबाइल पर स्क्रॉल स्मूथ करने के लिए */
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="l-s" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white p-6 rounded-3xl shadow-2xl border-b-8 border-orange-600">
            <div class="text-center mb-6">
                <div class="bg-orange-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-2">
                    <span class="text-3xl">🔐</span>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">एडमिन लॉगिन</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="u-i" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="लॉगिन ID">
                <input type="password" id="u-p" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="पासवर्ड">
                <button id="l-b" class="w-full bg-orange-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">प्रवेश करें</button>
            </div>
        </div>
    </div>

    <div id="d-b" class="hidden pb-20">
        <div class="bg-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <div>
                <h1 id="w-n" class="text-lg font-bold text-orange-600 leading-tight">नमस्ते, एडमिन</h1>
                <p class="text-xs text-gray-500">ग्राम शक्ति मैनेजमेंट</p>
            </div>
            <button onclick="location.reload()" class="bg-gray-100 p-2 rounded-xl text-red-500 font-bold text-sm">लॉग आउट</button>
        </div>

        <div id="s-t" class="hidden flex p-2 bg-white m-4 rounded-xl shadow-sm space-x-2">
            <button id="t1" class="flex-1 py-2 font-bold active-tab" onclick="_sT('w')">वर्कर्स</button>
            <button id="t2" class="flex-1 py-2 font-bold text-gray-500" onclick="_sT('a')">जिला एडमिन</button>
        </div>

        <div id="w-s" class="px-4">
            <h3 class="font-bold text-gray-700 mb-3">पंजीकृत वर्कर्स</h3>
            <div id="w-l" class="space-y-4">
                </div>
        </div>

        <div id="a-m" class="hidden px-4">
            <div class="bg-white p-5 rounded-2xl shadow-md mb-6 border-t-4 border-green-500">
                <h3 class="font-bold text-green-700 mb-4">नया एडमिन जोड़ें</h3>
                <div class="space-y-3">
                    <input type="text" id="an" placeholder="नाम" class="w-full p-3 border rounded-xl">
                    <input type="text" id="as" placeholder="राज्य" class="w-full p-3 border rounded-xl">
                    <input type="text" id="aj" placeholder="जिला" class="w-full p-3 border rounded-xl">
                    <input type="tel" id="ap" placeholder="ID (मोबाइल)" class="w-full p-3 border rounded-xl">
                    <input type="text" id="ak" placeholder="पासवर्ड" class="w-full p-3 border rounded-xl">
                    <button onclick="_cA()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">सेव करें</button>
                </div>
            </div>
            <div id="a-l-v" class="space-y-3"></div>
        </div>
    </div>

<script>
// --- फायरबेस सेटअप (आपका ओरिजिनल डेटा) ---
const config = {
    apiKey: "AIzaSyCuvev3-jwZwQuO_fHYyv2E2ovLny4Lh8Q",
    databaseURL: "https://gram-shakti-b135a-default-rtdb.firebaseio.com",
    projectId: "gram-shakti-b135a"
};
firebase.initializeApp(config);
const _db = firebase.database();
let _cU = null;

// लॉगिन लॉजिक
document.getElementById('l-b').addEventListener('click', function() {
    const id = document.getElementById('u-i').value.trim();
    const ps = document.getElementById('u-p').value.trim();
    
    // सुपर एडमिन चेक
    if(id === "Vikash" && ps === "Vikas0627.") {
        _cU = { role: 'super', name: 'विकास भाई' };
        _oD();
    } else {
        _db.ref('district_admins/' + id).once('value', s => {
            const d = s.val();
            if(d && d.pass === ps) {
                _cU = { role: 'district', name: d.name, jila: d.jila.toLowerCase() };
                _oD();
            } else { alert("गलत क्रेडेंशियल्स!"); }
        });
    }
});

function _oD() {
    document.getElementById('l-s').classList.add('hidden');
    document.getElementById('d-b').classList.remove('hidden');
    document.getElementById('w-n').innerText = "नमस्ते, " + _cU.name;
    if(_cU.role === 'super') {
        document.getElementById('s-t').classList.remove('hidden');
        _lW(); _lA();
    } else { _lW(_cU.jila); }
}

function _sT(t) {
    const w = document.getElementById('w-s'), a = document.getElementById('a-m');
    const t1 = document.getElementById('t1'), t2 = document.getElementById('t2');
    if(t === 'w') {
        w.classList.remove('hidden'); a.classList.add('hidden');
        t1.className = "flex-1 py-2 font-bold active-tab";
        t2.className = "flex-1 py-2 font-bold text-gray-500";
    } else {
        w.classList.add('hidden'); a.classList.remove('hidden');
        t2.className = "flex-1 py-2 font-bold active-tab";
        t1.className = "flex-1 py-2 font-bold text-gray-500";
    }
}

// वर्कर कार्ड व्यू
function _lW(f = null) {
    _db.ref('users/').on('value', s => {
        let h = "";
        s.forEach(c => {
            let d = c.val();
            if(f && d.jila.toLowerCase() !== f) return;
            h += `
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-orange-500 relative">
                <p class="text-xs font-bold text-orange-600 uppercase">${d.type}</p>
                <h4 class="text-lg font-bold text-gray-800">${d.name}</h4>
                <p class="text-sm text-gray-600">${d.post}</p>
                <p class="text-xs text-gray-400 mt-1">📍 ${d.village}, ${d.jila}</p>
                <div class="flex mt-3 space-x-2">
                    <a href="tel:${d.phone}" class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg font-bold text-sm">📞 कॉल करें</a>
                    <button onclick="_dR('${c.key}')" class="bg-red-50 text-red-500 px-4 rounded-lg">🗑️</button>
                </div>
            </div>`;
        });
        document.getElementById('w-l').innerHTML = h || "<p class='text-center p-10'>कोई वर्कर नहीं मिला</p>";
    });
}

function _cA() {
    const d = {
        name: document.getElementById('an').value,
        state: document.getElementById('as').value,
        jila: document.getElementById('aj').value,
        phone: document.getElementById('ap').value,
        pass: document.getElementById('ak').value
    };
    if(!d.phone || !d.pass) return alert("सब भरें!");
    _db.ref('district_admins/' + d.phone).set(d).then(() => alert("सफलतापूर्वक जोड़ा गया"));
}

function _lA() {
    _db.ref('district_admins/').on('value', s => {
        let h = "";
        s.forEach(c => {
            let d = c.val();
            h += `
            <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                <div>
                    <p class="font-bold text-gray-800">${d.name} (${d.jila})</p>
                    <p class="text-xs text-gray-500">ID: ${d.phone} | Pass: ${d.pass}</p>
                </div>
                <button onclick="_dA('${c.key}')" class="text-red-500">❌</button>
            </div>`;
        });
        document.getElementById('a-l-v').innerHTML = h;
    });
}

function _dR(k) { if(confirm("डिलीट करें?")) _db.ref('users/' + k).remove(); }
function _dA(k) { if(confirm("एडमिन हटाएं?")) _db.ref('district_admins/' + k).remove(); }

</script>
</body>
</html>
