<!DOCTYPE html>
<html>

<head>

<title>Customer Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<script src="script.js"></script>

</head>

<body>

<div class="container">

<h2>Customer Dashboard</h2>

<p>Welcome Customer</p>

<hr>

<h3>Available Workers</h3>

<div id="workerList"></div>

<hr>

<h3>Your Hire Requests</h3>

<div id="requestStatus"></div>

<br>

<a href="index.html">

<button class="menuBtn">Back to Home</button>

</a>

</div>


<script>

var mobile = localStorage.getItem("mobile");

if(!mobile){

alert("Please login first");

window.location="login.html";

}



// LOAD CUSTOMER REQUESTS

function loadRequests(){

firebase.database().ref("hire_requests").on("value",(snapshot)=>{

var data = snapshot.val();

var html="";

for(var key in data){

var req = data[key];

if(req.customerMobile == mobile){

html += `
<div class="card">

<b>Worker Mobile:</b> ${req.workerMobile}<br>

<b>Work:</b> ${req.work}<br>

<b>City:</b> ${req.city}<br>

<b>Status:</b> ${req.status}

</div>
`;

}

}

document.getElementById("requestStatus").innerHTML = html;

});

}

loadRequests();

</script>

</body>

</html>
