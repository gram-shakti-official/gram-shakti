<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gram Shakti - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Devanagari', sans-serif; 
            background-color: #fdfaf5; /* हल्का क्रीम बैकग्राउंड */
            -webkit-tap-highlight-color: transparent;
        }

        /* गोल्डन ग्रेडिएंट टेक्स्ट */
        .golden-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.1));
        }

        /* प्रीमियम ब्राउन ग्रेडिएंट */
        .brown-gradient {
            background: linear-gradient(135deg, #4e342e 0%, #212121 100%);
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #212121; display: flex; align-items: center;
            justify-content: center; z-index: 9999; transition: opacity 0.5s ease;
        }

        .premium-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(139, 94, 0, 0.1);
            border: 1px solid #f3e5f5;
            transition: transform 0.2s;
        }
        .premium-card:active { transform: scale(0.97); }

        /* सर्च बॉक्स */
        .search-container {
            border: 2px solid #bf953f;
            border-radius: 15px;
        }
    </style>
</head>
<body class="pb-24">

    <div id="splash">
        <div class="text-center">
            <h1 class="text-5xl golden-text mb-2 italic">Gram Shakti</h1>
            <p class="text-gray-400 text-xs tracking-[0.3em] uppercase">Rural Digital Revolution</p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        
        <div class="brown-gradient p-8 rounded-b-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl golden-text italic">Gram Shakti</h1>
            <p class="text-gray-300 text-[10px] mt-1 tracking-widest uppercase">Work • Services • Local Market</p>
            
            <div class="mt-6 flex bg-white rounded-2xl p-2 shadow-inner border border-[#bf953f]/30">
                <input type="text" id="searchInput" placeholder="वर्कर, सर्विस या शहर खोजें..." 
                       class="flex-1 p-2 outline-none text-sm text-gray-700 bg-transparent px-4">
                <button onclick="searchData()" class="brown-gradient text-[#fcf6ba] px-6 py-2 rounded-xl font-bold text-sm">खोजें</button>
            </div>
        </div>

        <div class="px-4 -mt-8 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.href='worker.html'" class="premium-card p-6 flex flex-col items-center border-b-4 border-green-600">
                    <span class="text-3xl mb-2">👷</span>
                    <span class="font-bold text-gray-800">वर्कर</span>
                    <span class="text-[9px] text-gray-400 uppercase">काम ढूंढें</span>
                </button>
                <button onclick="location.href='business.html'" class="premium-card p-6 flex flex-col items-center border-b-4 border-blue-600">
                    <span class="text-3xl mb-2">🏢</span>
                    <span class="font-bold text-gray-800">कंपनी</span>
                    <span class="text-[9px] text-gray-400 uppercase">हायर करें</span>
                </button>
            </div>
            <button onclick="location.href='customer.html'" class="premium-card w-full p-4 flex items-center justify-between border-l-8 border-[#bf953f]">
                <div class="flex items-center">
                    <span class="text-3xl mr-4">👤</span>
                    <div class="text-left">
                        <p class="font-bold text-gray-800 leading-tight">ग्राहक (Customer)</p>
                        <p class="text-[10px] text-gray-400">आस-पास की सेवाएँ बुक करें</p>
                    </div>
                </div>
                <span class="text-gray-300">❯</span>
            </button>
        </div>

        <div class="p-4 space-y-8 mt-6">
            
            <section>
                <h2 class="text-[#8d6e63] font-bold text-lg mb-3 flex items-center">
                    <span class="w-2 h-6 bg-[#bf953f] rounded-full mr-2"></span> उपलब्ध वर्कर
                </h2>
                <div id="workerList" class="space-y-4"></div>
            </section>

            <section>
                <h2 class="text-[#8d6e63] font-bold text-lg mb-3 flex items-center">
                    <span class="w-2 h-6 bg-blue-500 rounded-full mr-2"></span> हायर करने वाली कंपनियाँ
                </h2>
                <div id="companyList" class="space-y-4"></div>
            </section>

        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-3 flex justify-around shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center text-[#bf953f]">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">होम</span>
        </div>
        <div onclick="location.href='dashboard.html'" class="flex flex-col items-center text-gray-400">
            <span class="text-xl">📊</span>
            <span class="text-[10px] font-bold">डैशबोर्ड</span>
        </div>
        <div onclick="location.href='contact.html'" class="flex flex-col items-center text-gray-400">
            <span class="text-xl">🎧</span>
            <span class="text-[10px] font-bold">सपोर्ट</span>
        </div>
    </div>

<script>
    // आपका Firebase Config (जो आपने पहले दिया था)
    const firebaseConfig = {
      apiKey: "AIzaSyA0J8TCjU2wxDNmT2O4VMfchY06arTO-O0",
      databaseURL: "https://gram-shakti-app-2367b-default-rtdb.firebaseio.com",
      projectId: "gram-shakti-app-2367b",
    };
    firebase.initializeApp(firebaseConfig);

    // Splash Screen Logic
    setTimeout(() => {
        document.getElementById("splash").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("splash").style.display = "none";
            document.getElementById("mainApp").classList.remove("hidden");
        }, 500);
    }, 2500);

    // Firebase डेटा लोड करना
    firebase.database().ref("users").on("value", function(snapshot){
        var data = snapshot.val();
        var workerHTML = ""; var companyHTML = "";
        
        for(var key in data){
            var user = data[key];
            let cardTemplate = `
                <div class="premium-card p-4 relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">${user.name}</h3>
                            <p class="text-xs text-blue-600 font-bold uppercase tracking-tighter">${user.work || user.type}</p>
                        </div>
                        <a href="tel:${user.mobile}" class="bg-green-500 text-white p-2 px-4 rounded-xl text-xs font-bold shadow-md">📞 कॉल</a>
                    </div>
                    <div class="mt-3 flex items-center text-[11px] text-gray-400 font-bold">
                        <span class="mr-2">📍 ${user.city}</span>
                        <span class="bg-gray-100 px-2 py-0.5 rounded italic">ID: ${user.mobile}</span>
                    </div>
                </div>`;

            if(user.type == "worker") workerHTML += cardTemplate;
            else if(user.type == "company") companyHTML += cardTemplate;
        }
        document.getElementById("workerList").innerHTML = workerHTML || "<p class='text-center text-gray-300'>कोई वर्कर नहीं मिला</p>";
        document.getElementById("companyList").innerHTML = companyHTML || "<p class='text-center text-gray-300'>कोई कंपनी नहीं मिली</p>";
    });

    // सर्च फंक्शन
    function searchData(){
        var input = document.getElementById("searchInput").value.toLowerCase();
        var cards = document.querySelectorAll(".premium-card");
        cards.forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
        });
    }
</script>
</body>
</html>
