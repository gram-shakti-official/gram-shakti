<!DOCTYPE html>
<html>

<head>

<title>Gram Shakti App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<style>

/* Splash Screen */

#splash{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;

}

#splash img{
width:100%;
height:100%;
object-fit:cover;
}

/* Main App */

.container{
padding:15px;
display:none;
}

.title{
text-align:center;
color:#2a6df4;
}

.tagline{
text-align:center;
color:#666;
}

.searchBtn{
background:#2a6df4;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
}

.menu{
text-align:center;
margin:15px 0;
}

.menuBtn{
background:#ff9800;
border:none;
padding:12px 20px;
margin:5px;
border-radius:8px;
color:white;
font-size:16px;
}

.card{

border:1px solid #ddd;
padding:10px;
margin:10px 0;
border-radius:8px;
background:white;

}

.company{
background:#e8f1ff;
}

.shop{
background:#eaffea;
}

</style>

</head>

<body>


<!-- SPLASH BANNER -->

<div id="splash">

<img src="banner.jpg">

</div>


<!-- MAIN APP -->

<div class="container" id="mainApp">

<h1 class="title">Gram Shakti</h1>

<p class="tagline">India Work • Services • Local Market</p>

<input type="text" id="searchInput" placeholder="Search Worker, Service, City">

<button class="searchBtn" onclick="searchData()">Search</button>

<div class="menu">

<a href="customer.html">
<button class="menuBtn">Customer</button>
</a>

<a href="worker.html">
<button class="menuBtn">Worker</button>
</a>

<a href="business.html">
<button class="menuBtn">Company</button>
</a>

</div>

<hr>

<h2>Workers</h2>

<div id="workerList"></div>

<hr>

<h2>Companies Hiring</h2>

<div id="companyList"></div>

<hr>

<h2>Local Shops</h2>

<div id="shopList"></div>

</div>


<script>

/* Splash Screen 3 sec */

setTimeout(function(){

document.getElementById("splash").style.display="none";
document.getElementById("mainApp").style.display="block";

},3000);


/* Firebase Load Data */

var ref = firebase.database().ref("users");

ref.on("value", function(snapshot){

var data = snapshot.val();

var workerHTML = "";
var companyHTML = "";
var shopHTML = "";

for(var key in data){

var user = data[key];


// WORKERS

if(user.type == "worker"){

workerHTML += "<div class='card'>";

workerHTML += "<b>Name:</b> "+user.name+"<br>";

workerHTML += "<b>Work:</b> "+user.work+"<br>";

workerHTML += "<b>City:</b> "+user.city+"<br>";

workerHTML += "<b>Mobile:</b> "+user.mobile+"<br>";

workerHTML += "</div>";

}


// COMPANY

if(user.type == "company"){

companyHTML += "<div class='card company'>";

companyHTML += "<b>Company:</b> "+user.name+"<br>";

companyHTML += "<b>City:</b> "+user.city+"<br>";

companyHTML += "<b>Contact:</b> "+user.mobile+"<br>";

companyHTML += "</div>";

}


// SHOPS

if(user.type == "shop"){

shopHTML += "<div class='card shop'>";

shopHTML += "<b>Shop:</b> "+user.name+"<br>";

shopHTML += "<b>Category:</b> "+user.work+"<br>";

shopHTML += "<b>City:</b> "+user.city+"<br>";

shopHTML += "<b>Mobile:</b> "+user.mobile+"<br>";

shopHTML += "</div>";

}

}

document.getElementById("workerList").innerHTML = workerHTML;
document.getElementById("companyList").innerHTML = companyHTML;
document.getElementById("shopList").innerHTML = shopHTML;

});


/* Search Function */

function searchData(){

var input = document.getElementById("searchInput").value.toLowerCase();

var cards = document.querySelectorAll(".card");

cards.forEach(function(card){

if(card.innerText.toLowerCase().includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

</script>

</body>

                      </html>
