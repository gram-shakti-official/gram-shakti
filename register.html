<!DOCTYPE html>
<html>

<head>

<title>Register - Gram Shakti</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

</head>

<body>

<div class="container">

<h2>Register</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="mobile" placeholder="Mobile Number">

<select id="type">

<option value="">Select Type</option>

<option value="worker">Worker</option>

<option value="customer">Customer</option>

<option value="shop">Shop / Business</option>

<option value="company">Company</option>

</select>

<input type="text" id="work" placeholder="Work / Service (Electrician, Driver, etc.)">

<input type="text" id="city" placeholder="Village / City">

<button onclick="registerUser()">Register</button>

<br><br>

<a href="login.html">

<button class="menuBtn">Already Registered? Login</button>

</a>

</div>

</body>

</html>
