<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Worker Registration - Gram Shakti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Devanagari', sans-serif; background-color: #fdfaf5; }
        .golden-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brown-btn { background: linear-gradient(135deg, #4e342e 0%, #212121 100%); }
        .input-premium { @apply w-full p-4 bg-white border border-gray-100 rounded-2xl outline-none shadow-sm focus:ring-2 focus:ring-[#bf953f] transition-all; }
        
        /* GPS पल्स एनीमेशन */
        .gps-active { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto">
        <div class="text-center my-8">
            <h1 class="text-4xl golden-text font-black italic">वर्कर पंजीकरण</h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-[0.2em] font-bold">Register as a Skilled Worker</p>
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-2xl border border-[#bf953f]/20 space-y-4">
            
            <div>
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">पूरा नाम</label>
                <input type="text" id="name" class="input-premium mt-1" placeholder="जैसे: विकास कुमार">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">मोबाइल नंबर</label>
                <input type="tel" id="mobile" class="input-premium mt-1" placeholder="9784..." maxlength="10">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">काम की श्रेणी (Category)</label>
                <select id="work" class="input-premium mt-1">
                    <option value="">काम चुनें</option>
                    <option>Farmer (किसान)</option>
                    <option>Tractor Service (ट्रैक्टर)</option>
                    <option>Electrician (बिजली मिस्त्री)</option>
                    <option>Plumber (नल मिस्त्री)</option>
                    <option>Mason (राज मिस्त्री)</option>
                    <option>Driver (गाड़ी चालक)</option>
                    <option>Carpenter (बढ़ई)</option>
                    <option>Painter (रंगसाज)</option>
                    <option>Mechanic (मैकेनिक)</option>
                    <option>Labor (मजदूर)</option>
                    <option>Tailor (दर्जी)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-2 uppercase">पिनकोड</label>
                    <input type="number" id="pincode" class="input-premium mt-1" placeholder="302001">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 ml-2 uppercase">गाँव/क्षेत्र</label>
                    <input type="text" id="village" class="input-premium mt-1" placeholder="गाँव का नाम">
                </div>
            </div>

            <button onclick="getLocation()" id="gpsBtn" class="w-full bg-blue-50 text-blue-600 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-blue-100 active:scale-95 transition-all">
                <span id="gpsIcon">📍</span> <span id="gpsText">GPS लोकेशन सेट करें</span>
            </button>

            <button onclick="registerWorker()" class="w-full brown-btn text-[#fcf6ba] p-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all mt-4">
                पंजीकरण पूरा करें ✨
            </button>

            <p id="status" class="text-center text-xs font-bold"></p>
        </div>
    </div>

<script>
    var lat = ""; var lng = "";
    
    // Firebase Initialize (आपकी ID: gram-shakti-app-2367b)
    const firebaseConfig = {
      apiKey: "AIzaSyA0J8TCjU2wxDNmT2O4VMfchY06arTO-O0",
      databaseURL: "https://gram-shakti-app-2367b-default-rtdb.firebaseio.com",
      projectId: "gram-shakti-app-2367b",
    };
    firebase.initializeApp(firebaseConfig);

    function getLocation() {
        let btn = document.getElementById("gpsBtn");
        let txt = document.getElementById("gpsText");
        txt.innerText = "लोकेशन ढूँढ रहे हैं...";
        btn.classList.add("gps-active");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                lat = position.coords.latitude;
                lng = position.coords.longitude;
                txt.innerText = "लोकेशन सेट हो गई ✅";
                btn.classList.replace("bg-blue-50", "bg-green-50");
                btn.classList.replace("text-blue-600", "text-green-600");
                btn.classList.remove("gps-active");
            }, function() {
                alert("लोकेशन नहीं मिल सकी। कृपया GPS ऑन करें।");
                txt.innerText = "GPS ऑन करके फिर कोशिश करें";
            });
        }
    }

    function registerWorker() {
        var name = document.getElementById("name").value.trim();
        var mobile = document.getElementById("mobile").value.trim();
        var work = document.getElementById("work").value;
        var pincode = document.getElementById("pincode").value;
        var village = document.getElementById("village").value.trim();

        if (!name || !mobile || !work || !pincode || !village) {
            alert("कृपया सभी जानकारी भरें!"); return;
        }
        if (!lat) {
            alert("मैप पर दिखाने के लिए GPS लोकेशन लेना जरूरी है!"); return;
        }

        firebase.database().ref("users/" + mobile).set({
            name: name,
            mobile: mobile,
            work: work,
            pincode: pincode,
            village: village,
            lat: lat,
            lng: lng,
            type: "worker",
            status: "verified", // डिफ़ॉल्ट वेरिफाइड या पेंडिंग रख सकते हैं
            timestamp: Date.now()
        }, function(error) {
            if (error) { alert("Error: " + error.message); } 
            else {
                document.getElementById("status").innerHTML = "<span class='text-green-600'>सफलतापूर्वक पंजीकृत! ✅</span>";
                alert("बधाई हो! आप ग्राम शक्ति से जुड़ चुके हैं।");
                window.location.href = "login.html";
            }
        });
    }
</script>
</body>
</html>
