<!DOCTYPE html>
<html>

<head>

<title>Worker Dashboard - Gram Shakti</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="categories.js"></script>

</head>

<body>

<div class="container">

<h2>Worker Dashboard</h2>

<p>Welcome Worker</p>

<hr>

<h3>Your Profile</h3>

<div id="workerProfile"></div>

<hr>

<h3>Your Services</h3>

<select id="serviceSelect">

<option value="">Select Your Service</option>

</select>

<br>

<button class="menuBtn" onclick="addService()">
Add Service
</button>

<ul id="serviceList" style="text-align:left"></ul>

<hr>

<h3>Hire Requests</h3>

<div id="requestList"></div>

<br>

<a href="index.html">

<button class="menuBtn">
Back to Home
</button>

</a>

</div>


<script>

/* LOGIN CHECK */

var mobile = localStorage.getItem("mobile");

if(!mobile){

alert("Please login first");

window.location="login.html";

}


/* LOAD PROFILE */

firebase.database().ref("users").once("value", function(snapshot){

var data = snapshot.val();

var html="";

for(var key in data){

var user=data[key];

if(user.mobile == mobile){

html += `
<div class="card">

<b>Name:</b> ${user.name}<br>

<b>Work:</b> ${user.work}<br>

<b>City:</b> ${user.city}<br>

<b>Mobile:</b> ${user.mobile}

</div>
`;

}

}

document.getElementById("workerProfile").innerHTML = html;

});


/* LOAD CATEGORIES */

var select=document.getElementById("serviceSelect");

categories.forEach(function(cat){

var option=document.createElement("option");

option.value=cat;
option.text=cat;

select.appendChild(option);

});


/* ADD SERVICE */

function addService(){

var service=document.getElementById("serviceSelect").value;

if(service==""){

alert("Select service first");

return;

}

var li=document.createElement("li");

li.innerText=service;

document.getElementById("serviceList").appendChild(li);

}

</script>

</body>

</html>
