<!DOCTYPE html>
<html>

<head>

<title>Worker Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Firebase Config -->
<script src="firebase.js"></script>

</head>

<body>

<h2>Worker Dashboard</h2>

<p>Welcome Worker</p>

<hr>

<h3>Your Profile</h3>

<div id="workerProfile"></div>

<hr>

<h3>Your Services</h3>

<ul>
<li>Driver</li>
<li>Plumber</li>
<li>Electrician</li>
<li>Labor</li>
<li>Cook</li>
<li>Cleaner</li>
<li>Gardener</li>
</ul>

<hr>

<h3>Hire Requests</h3>

<div id="requestList"></div>

<br>

<a href="index.html">
<button>Back to Home</button>
</a>


<script>

var mobile = localStorage.getItem("mobile");


// WORKER PROFILE LOAD

firebase.database().ref("users").once("value", function(snapshot){

var data = snapshot.val();
var html = "";

for(var key in data){

if(data[key].mobile == mobile){

html += "<div style='border:1px solid gray;padding:10px;margin:10px;'>";

html += "<b>Name:</b> "+data[key].name+"<br>";
html += "<b>Work:</b> "+data[key].work+"<br>";
html += "<b>City:</b> "+data[key].city+"<br>";
html += "<b>Mobile:</b> "+data[key].mobile+"<br>";

html += "</div>";

}

}

document.getElementById("workerProfile").innerHTML = html;

});




// LOAD REQUESTS

function loadWorkerRequests(){

firebase.database().ref("requests").on("value", function(snapshot){

var data = snapshot.val();
var html = "";

for(var key in data){

if(data[key].workerMobile == mobile){

html += "<div style='border:1px solid black;padding:10px;margin:10px;'>";

html += "<b>Customer:</b> "+data[key].customerMobile+"<br>";
html += "<b>Work:</b> "+data[key].work+"<br>";
html += "<b>City:</b> "+data[key].city+"<br>";
html += "<b>Status:</b> "+data[key].status+"<br><br>";

html += "<button onclick=\"acceptRequest('"+key+"')\">Accept</button>";

html += " ";

html += "<button onclick=\"rejectRequest('"+key+"')\">Reject</button>";

html += "</div>";

}

}

document.getElementById("requestList").innerHTML = html;

});

}


loadWorkerRequests();




// ACCEPT REQUEST

function acceptRequest(id){

firebase.database().ref("requests/"+id).update({

status : "Accepted"

});

alert("Request Accepted");

}




// REJECT REQUEST

function rejectRequest(id){

firebase.database().ref("requests/"+id).update({

status : "Rejected"

});

alert("Request Rejected");

}

</script>

</body>
</html>
