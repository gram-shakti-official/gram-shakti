<!DOCTYPE html>
<html>

<head>

<title>Worker Registration - Gram Shakti</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

h1{
text-align:center;
}

input,select{

width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;

}

.locationBtn{

background:#2a6df4;

}

#status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

</head>

<body>

<div class="container">

<h1>Worker Registration</h1>

<input 
type="text" 
id="name" 
placeholder="Name"
required>

<input 
type="tel" 
id="mobile" 
placeholder="Mobile Number"
minlength="10"
maxlength="10"
pattern="[0-9]{10}"
required>

<select id="work">

<option value="">Select Work</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Mason</option>
<option>Driver</option>
<option>Carpenter</option>
<option>Painter</option>

</select>

<input 
type="number" 
id="pincode" 
placeholder="PIN Code"
required>

<input 
type="text" 
id="village" 
placeholder="Village / Area"
required>


<button class="locationBtn" onclick="getLocation()">

📍 Get GPS Location

</button>


<button onclick="registerWorker()">

Register Worker

</button>

<p id="status"></p>

</div>


<script>

var lat = "";
var lng = "";


/* GET GPS LOCATION */

function getLocation(){

let status = document.getElementById("status");

status.innerHTML = "लोकेशन खोजी जा रही है... ⏳";

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

lat = position.coords.latitude;
lng = position.coords.longitude;

status.innerHTML = "लोकेशन मिल गई ✅";

}, function(){

status.innerHTML = "लोकेशन नहीं मिल सकी ❌";

});

}else{

status.innerHTML = "GPS supported नहीं है";

}

}



/* REGISTER WORKER */

function registerWorker(){

var name = document.getElementById("name").value;
var mobile = document.getElementById("mobile").value;
var work = document.getElementById("work").value;
var pincode = document.getElementById("pincode").value;
var village = document.getElementById("village").value;

if(!name || !mobile || !work || !pincode || !village){

alert("सभी जानकारी भरें");

return;

}

if(mobile.length != 10){

alert("सही 10 अंकों का मोबाइल नंबर डालें");

return;

}

if(!lat){

alert("पहले GPS Location लें");

return;

}


var ref = firebase.database().ref("users");

var newUser = ref.push();

newUser.set({

name:name,
mobile:mobile,
work:work,
pincode:pincode,
village:village,
lat:lat,
lng:lng,
type:"worker",
timestamp:Date.now()

},function(error){

if(error){

alert("डेटा सेव नहीं हो पाया ❌");

}else{

document.getElementById("status").innerHTML =
"पंजीकरण सफल रहा! ✅";

/* FORM RESET */

document.querySelectorAll("input").forEach(function(input){
input.value="";
});

document.getElementById("work").value="";

lat="";
lng="";

}

});

}

</script>

</body>

</html>
