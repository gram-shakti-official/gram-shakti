<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Post Ad - Gram Shakti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Devanagari', sans-serif; 
            background: #fdfdfd; 
            -webkit-tap-highlight-color: transparent;
        }
        /* इनपुट पर क्लिक करते ही बॉर्डर का रंग बदलने के लिए */
        input:focus, textarea:focus, select:focus {
            border-color: #2563eb;
            background: #fff;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 p-6 text-white text-center">
            <h2 class="text-2xl font-bold">विज्ञापन पोस्ट करें</h2>
            <p class="text-blue-100 text-sm opacity-90">अपना व्यापार बढ़ाएं 🚀</p>
        </div>

        <div class="p-6 space-y-5">
            <div>
                <input type="text" id="name" class="w-full p-4 bg-gray-50 border border-transparent rounded-2xl outline-none transition-all" placeholder="दुकान / बिजनेस का नाम">
            </div>

            <div>
                <input type="text" id="type" class="w-full p-4 bg-gray-50 border border-transparent rounded-2xl outline-none transition-all" placeholder="स्कूल / दुकान / कंपनी / सर्विस">
            </div>

            <div>
                <input type="text" id="city" class="w-full p-4 bg-gray-50 border border-transparent rounded-2xl outline-none transition-all" placeholder="शहर / पंचायत का नाम">
            </div>

            <div>
                <textarea id="adText" rows="4" class="w-full p-4 bg-gray-50 border border-transparent rounded-2xl outline-none transition-all resize-none" placeholder="अपना विज्ञापन यहाँ लिखें..."></textarea>
            </div>

            <div class="relative">
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">विज्ञापन की अवधि (दिनों में)</label>
                <select id="days" class="w-full p-4 mt-1 bg-gray-50 border border-transparent rounded-2xl outline-none transition-all appearance-none">
                    <option value="7">7 Days (1 हफ्ता)</option>
                    <option value="15">15 Days (2 हफ्ते)</option>
                    <option value="30">30 Days (1 महीना)</option>
                </select>
            </div>

            <button onclick="postAd()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                अभी विज्ञापन लगायें ✨
            </button>
        </div>
    </div>

<script>
// फायरबेस (आपका कॉन्फ़िगरेशन यहाँ आएगा)
const firebaseConfig = {
    apiKey: "AIzaSyCuvev3-jwZwQuO_fHYyv2E2ovLny4Lh8Q",
    databaseURL: "https://gram-shakti-b135a-default-rtdb.firebaseio.com",
    projectId: "gram-shakti-b135a"
};
firebase.initializeApp(firebaseConfig);

function postAd(){
    var name = document.getElementById("name").value.trim();
    var type = document.getElementById("type").value.trim();
    var city = document.getElementById("city").value.trim();
    var adText = document.getElementById("adText").value.trim();
    var days = document.getElementById("days").value;

    if(!name || !adText) {
        alert("कृपया नाम और विज्ञापन का विवरण भरें!");
        return;
    }

    var adData = {
        name: name,
        type: type,
        city: city,
        adText: adText,
        days: days,
        timestamp: Date.now()
    };

    firebase.database().ref("advertisements").push(adData)
    .then(() => {
        alert("आपका विज्ञापन सफलतापूर्वक पोस्ट हो गया! ✅");
        // फॉर्म को साफ करना
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    })
    .catch((error) => {
        alert("Error: " + error.message);
    });
}
</script>
</body>
</html>
