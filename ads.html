<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>विज्ञापन पोस्ट करें - ग्राम शक्ति</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Devanagari', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .input-style {
            @apply w-full p-4 bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all;
        }
    </style>
</head>
<body class="pb-10">

    <div class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-2xl font-bold">नया विज्ञापन जोड़ें</h1>
        <p class="text-blue-100 text-sm">अपने व्यापार को ग्राम शक्ति से बढ़ाएं</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <form id="adForm" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">दुकान / बिजनेस का नाम</label>
                <input type="text" id="businessName" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="उदा: विकास हार्डवेयर" required>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">मोबाइल नंबर</label>
                    <input type="tel" id="mobile" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="98765..." required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">समय सीमा</label>
                    <select id="duration" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="7">7 दिन</option>
                        <option value="15">15 दिन</option>
                        <option value="30">30 दिन</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">विज्ञापन का शीर्षक (Title)</label>
                <input type="text" id="title" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="उदा: सेल! 50% छूट" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">विवरण (Description)</label>
                <textarea id="description" rows="3" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="अपनी सर्विस के बारे में लिखें..." required></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="state" placeholder="राज्य" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                <input type="text" id="district" placeholder="जिला" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                <input type="text" id="city" placeholder="शहर / पंचायत" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                <input type="text" id="village" placeholder="गांव (Optional)" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-blue-200 shadow-lg active:scale-95 transition-all">
                विज्ञापन सबमिट करें
            </button>
        </form>

        <h2 class="text-xl font-bold text-gray-800 mt-10 mb-4 ml-2">सक्रिय विज्ञापन (Active Ads)</h2>
        <div id="adList" class="space-y-4">
            </div>
    </div>

<script>
    // फायरबेस कॉन्फ़िगरेशन (वही जो आपके पास है)
    const firebaseConfig = {
        apiKey: "AIzaSyCuvev3-jwZwQuO_fHYyv2E2ovLny4Lh8Q",
        databaseURL: "https://gram-shakti-b135a-default-rtdb.firebaseio.com",
        projectId: "gram-shakti-b135a"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // डेटा सबमिट करना
    document.getElementById("adForm").addEventListener("submit", function(e){
        e.preventDefault();

        var adData = {
            businessName: document.getElementById("businessName").value,
            mobile: document.getElementById("mobile").value,
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            state: document.getElementById("state").value,
            district: document.getElementById("district").value,
            city: document.getElementById("city").value,
            village: document.getElementById("village").value,
            duration: document.getElementById("duration").value,
            time: Date.now()
        };

        database.ref("advertisements").push(adData).then(() => {
            alert("विज्ञापन सफलतापूर्वक भेजा गया!");
            document.getElementById("adForm").reset();
        });
    });

    // डेटा दिखाना (कार्ड स्टाइल में)
    database.ref("advertisements").on("value", function(snapshot){
        var data = snapshot.val();
        var html = "";
        for(var key in data){
            html += `
            <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 border-blue-500">
                <div class="flex justify-between items-start mb-2">
                    <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Ad #${data[key].duration} Days</span>
                    <span class="text-gray-400 text-xs">📍 ${data[key].city}</span>
                </div>
                <h3 class="font-bold text-gray-800 text-lg">${data[key].title}</h3>
                <p class="text-sm text-gray-600 mt-1">${data[key].description}</p>
                
                <div class="mt-4 pt-4 border-t border-dashed border-gray-100 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase leading-none">Business</p>
                        <p class="font-bold text-gray-700 text-sm">${data[key].businessName}</p>
                    </div>
                    <a href="tel:${data[key].mobile}" class="bg-green-500 text-white p-2 px-4 rounded-xl text-xs font-bold shadow-md">
                        संपर्क करें
                    </a>
                </div>
            </div>`;
        }
        document.getElementById("adList").innerHTML = html || "<p class='text-center text-gray-400'>कोई विज्ञापन नहीं है</p>";
    });
</script>
</body>
</html>
