name: Build Mobile App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Prepare Web Folder and Android Project
        run: |
          # 1. एक नया 'www' फोल्डर बनाएं और अपनी वेबसाइट की फाइल्स उसमें डालें
          mkdir www
          cp -r *.html *.css *.js www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          
          # 2. Capacitor इंस्टॉल और सेटअप करें
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Gram Shakti" "com.gramshakti.app" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Working-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
