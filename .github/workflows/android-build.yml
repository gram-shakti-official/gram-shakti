name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # 'gram_shakti' फोल्डर के अंदर जाकर कमांड रन करेगा
        run: |
          if [ -d "gram_shakti" ]; then
            cd gram_shakti
          fi
          flutter pub get

      - name: Build APK
        run: |
          if [ -d "gram_shakti" ]; then
            cd gram_shakti
          fi
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # यह रिपॉजिटरी में कहीं भी बनी APK को ढूंढ लेगा
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
          
