name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies and Build
        run: |
          # यह कमांड खुद ढूंढेगी कि pubspec.yaml कहाँ है और वहीं जाकर काम करेगी
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -print -quit)
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Project found in: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
