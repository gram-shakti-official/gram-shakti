name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter Project & Inject Code
        run: |
          # 1. नया प्रोजेक्ट बनाना (ताकि android फोल्डर बन जाए)
          flutter create . --platforms android --org com.gramshakti.app
          
          # 2. इंटरनेट परमिशन जोड़ना (इसके बिना ऐप में इंटरनेट नहीं चलेगा)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # 3. जरूरी लाइब्रेरी जोड़ना
          flutter pub add webview_flutter
          
          # 4. main.dart फाइल लिखना (वेबसाइट को ऐप में लोड करने के लिए)
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() => runApp(const MaterialApp(
            home: GramShakti(), 
            debugShowCheckedModeBanner: false
          ));

          class GramShakti extends StatefulWidget {
            const GramShakti({super.key});
            @override
            State<GramShakti> createState() => _GramShaktiState();
          }

          class _GramShaktiState extends State<GramShakti> {
            late final WebViewController controller;
            
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onWebResourceError: (WebResourceError error) {
                      debugPrint("Error loading page: \${error.description}");
                    },
                  ),
                )
                ..loadRequest(Uri.parse('https://gram-shakti-official.github.io/gram_shakti/'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: WebViewWidget(controller: controller),
                ),
              );
            }
          }
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Final-App
          path: build/app/outputs/flutter-apk/app-release.apk
