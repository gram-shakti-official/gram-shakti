name: Build Gram Shakti App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build APK Directly
        # यह एक्शन बिना किसी बाहरी क्लोन के सीधे काम करता है
        uses: w9jds/firebase-action@master
        with:
          args: |
            # हम यहाँ एक छोटा सा कमांड रन करेंगे जो सिर्फ फाइल्स को चेक करेगा
            ls -R

      - name: Website to APK (Final Try)
        uses: swantzter/website-to-apk-action@v1
        with:
          websiteUrl: https://gram-shakti-official.github.io/gram_shakti/
          appName: Gram Shakti
          outputFileName: GramShakti.apk

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Success
          path: GramShakti.apk
