name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create APK Folder
      run: mkdir apk

    - name: Zip Website as APK
      run: |
        zip -r apk/gramshakti.apk .

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GramShakti-App
        path: apk/gramshakti.apk
