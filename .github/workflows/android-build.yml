name: Build Website to APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # यह आपकी वेबसाइट फाइलों को चेक करेगा और बिल्ड प्रोसेस शुरू करेगा
          echo "Starting build for Gram Shakti..."
          # बबलरैप या अन्य टूल की जगह हम एक सिंपल और वर्किंग Action का उपयोग करेंगे
          
      - name: Build Android with CloudConvert
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: "gram-shakti"
          directory: "."
          
