name: Build Gram Shakti App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Android APK
        # यह एक्शन बिना किसी भारी सेटअप के आपकी वेबसाइट को सीधे APK में बदल देगा
        uses: alywars/sql-to-apk@v1.1
        with:
          website-url: https://gram-shakti-official.github.io/gram_shakti/
          app-name: "Gram Shakti"
          icon-url: https://raw.githubusercontent.com/gram-shakti-official/gram_shakti/main/assets/icon.png

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Installable
          path: ./*.apk
