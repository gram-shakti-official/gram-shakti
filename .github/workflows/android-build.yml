name: Build Website to APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Android App from HTML
        uses: flaming-codes/website-to-app-action@v1.3.0
        with:
          # यहाँ अपनी वेबसाइट का नाम लिखें
          app-name: "Gram Shakti"
          # आपकी मुख्य फाइल का नाम
          web-path: "index.html"
          # पैकेज का नाम
          package-id: "com.gramshakti.app"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-APK
          path: ./*.apk
