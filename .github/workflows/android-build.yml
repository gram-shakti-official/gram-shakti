name: Build Mobile App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Clean and Prepare Project
        run: |
          rm -rf android www node_modules
          mkdir www
          cp -r *.html *.css *.js www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Gram Shakti" "com.gramshakti.app" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # इससे बिल्ड ज्यादा स्टेबल होगा

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # '--no-daemon' इस्तेमाल करने से मेमोरी वाले एरर नहीं आएंगे
          ./gradlew assembleDebug --no-daemon

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
