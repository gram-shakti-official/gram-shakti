name: Deploy Website to GitHub Pages

# यह तब चलेगा जब आप 'main' ब्रांच में कोई बदलाव करेंगे
on:
  push:
    branches:
      - main
  workflow_dispatch: # इससे आप इसे बटन दबाकर भी चला सकते हैं

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # यहाँ '.' का मतलब है कि आपकी HTML फाइलें मुख्य फोल्डर में हैं
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
