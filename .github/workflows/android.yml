name: Build Android WebView APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project
        run: |
          # यह कमांड आपकी वेबसाइट को एक बेसिक Android फ्रेमवर्क में डाल देगी
          npx degit r0adkll/stonky-webview-template android-app
          cp -r ./* android-app/app/src/main/assets/ 2>/dev/null || true
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gram-Shakti-Web-APK
          path: "android-app/app/build/outputs/apk/release/*.apk"
          
